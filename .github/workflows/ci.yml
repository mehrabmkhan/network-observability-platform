name: ci

on:
  push:
    paths:
      - "exporter/**"
      - "alert-receiver/**"
      - "prometheus/**"
      - "grafana/**"
      - "alertmanager/**"
      - "scripts/**"
      - "tests/**"
      - "requirements-dev.txt"
      - "docker-compose.yml"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "exporter/**"
      - "alert-receiver/**"
      - "prometheus/**"
      - "grafana/**"
      - "alertmanager/**"
      - "scripts/**"
      - "tests/**"
      - "requirements-dev.txt"
      - "docker-compose.yml"
      - ".github/workflows/ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Validate configs
        run: python scripts/validate_configs.py

      - name: Run tests
        run: pytest
